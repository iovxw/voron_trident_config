services:
  klipper:
    image: docker.io/mkuf/klipper:latest
    privileged: true
    group_add:
      - "986" # host uucp gid
    logging:
      driver: none # file logging
    volumes:
      - tmp:/tmp
      - run:/opt/printer_data/run
      - logs:/opt/printer_data/logs
      - /dev:/dev
      # plugins
      - ./klippy/extras/autotune_tmc.py:/opt/klipper/klippy/extras/autotune_tmc.py
      - ./klippy/extras/motor_constants.py:/opt/klipper/klippy/extras/motor_constants.py
      - ./klippy/extras/motor_database.cfg:/opt/klipper/klippy/extras/motor_database.cfg
      # configs
      - .:/opt/printer_data/config
      - /opt/printer_data/config/gcodes
      # data
      - ./gcodes:/opt/printer_data/gcodes
    command: >
      -I printer_data/run/klipper.tty
      -a printer_data/run/klipper.sock
      -l printer_data/logs/klippy.log
      printer_data/config/klipper.conf

  moonraker:
    image: docker.io/mkuf/moonraker:latest
    ports:
      - "7125:7125"
    volumes:
      - run:/opt/printer_data/run
      - logs:/opt/printer_data/logs
      - .:/opt/printer_data/config
      - ./gcodes:/opt/printer_data/gcodes
      # disable warnings
      - /dev/null:/opt/klipper/config/null
      - /dev/null:/opt/klipper/docs/null

  tools:
    image: docker.io/mkuf/klipper:latest-tools
    profiles:
      - tools
    tty: true
    privileged: true
    group_add:
      - "986" # host uucp gid
    entrypoint: bash -c
    working_dir: /opt/klipper
    volumes:
      - tmp:/tmp
      - /dev:/dev
      - ./kconfig:/opt/klipper/.config

volumes:
  run:
    driver_opts:
      type: tmpfs
      device: tmpfs
  logs:
    driver_opts:
      type: tmpfs
      device: tmpfs
  tmp: # for /tmp/resonances_*.csv
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "mode=1777"
